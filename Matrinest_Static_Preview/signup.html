<main>
<section class="section" style="padding-top:54px;">
  <div class="form-shell">
    <h2>Create your nest</h2>
    <p class="sub">Start your care journey with মাতৃNest.</p>
    <form>
      <div class="field"><label>Username</label><input type="text" placeholder="Choose a username"></div>
      <div class="field"><label>Email</label><input type="email" placeholder="your@email.com"></div>
      <div class="field"><label>Password</label><input type="password" placeholder="Create a password"></div>
      <div class="field"><label>I am a</label><select><option>Patient / Parent</option><option>Doctor</option></select></div>
      <button type="submit" class="btn btn-primary btn-block" onclick="window.location.href='home.html'; return false;">Sign up</button>
    </form>
    <p class="form-foot">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</section>
